events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker DNS — يعيد resolve الـ IPs ديناميكياً بعد كل restart
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # متغيرات الـ upstream (تُحل ديناميكياً)
        set $upm_backend   upm_django_app:8000;
        set $ai_backend    ai_django_app:8000;
        set $notif_backend notification_django:8000;

        # ── UPM API ──────────────────────────────────────────────────────────
        location /api/upm/ {
            proxy_pass http://$upm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'http://localhost:3000' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRFToken' always;
                add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                add_header 'Content-Length' 0 always;
                return 204;
            }
        }

        location /upm/ {
            rewrite ^/upm/(.*)$ /api/upm/$1 break;
            proxy_pass http://$upm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── AI API ───────────────────────────────────────────────────────────
        location /api/analysis/ {
            proxy_pass http://$ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin $http_origin;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # ── Notifications ────────────────────────────────────────────────────
        location /api/notifications/ {
            proxy_pass http://$notif_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── JWT ──────────────────────────────────────────────────────────────
        location /api/token/ {
            proxy_pass http://$upm_backend;
            proxy_set_header Host localhost;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_pass_request_headers on;
        }

        # UPM Admin ────────────────────────────────────────────────────────
        location = /admin { return 302 /admin/; }

        location /admin/ {
            proxy_pass http://$upm_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_pass_request_headers on;
            proxy_redirect off;
        }

        # ── AI Admin ─────────────────────────────────────────────────────────
        location = /admin-ai { return 302 /admin-ai/; }

        location /admin-ai/ {
            rewrite ^/admin-ai/(.*)$ /admin/$1 break;
            proxy_pass http://$ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-CSRFToken $http_x_csrftoken;
            proxy_pass_request_headers on;
            proxy_redirect ~^/admin/(.*)$ /admin-ai/$1;
            proxy_cookie_path /admin/ /admin-ai/;
            sub_filter 'action="/admin/' 'action="/admin-ai/';
            sub_filter 'href="/admin/' 'href="/admin-ai/';
            sub_filter_once off;
            sub_filter_types text/html;
        }

        # AI static files
        location /static/ai/ {
            proxy_pass http://ai_django_app:8000;
            proxy_set_header Host localhost;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # UPM static files (override)
        location /static/upm/ {
            proxy_pass http://upm_django_app:8000;
            proxy_set_header Host localhost;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Swagger / ReDoc ──────────────────────────────────────────────────
        location /swagger-upm/ {
            rewrite ^/swagger-upm/(.*)$ /swagger/$1 break;
            proxy_pass http://$upm_backend/;
            proxy_set_header Host $host;
        }
        location /redoc-upm/ {
            rewrite ^/redoc-upm/(.*)$ /redoc/$1 break;
            proxy_pass http://$upm_backend/;
            proxy_set_header Host $host;
        }
        location /swagger-ai/ {
            rewrite ^/swagger-ai/(.*)$ /swagger/$1 break;
            proxy_pass http://$ai_backend;
            proxy_set_header Host $host;
        }
        location /redoc-ai/ {
            rewrite ^/redoc-ai/(.*)$ /redoc/$1 break;
            proxy_pass http://$ai_backend;
            proxy_set_header Host $host;
        }

        # ── Fallback ─────────────────────────────────────────────────────────
        location / {
            return 404 "API Gateway: No route for this path";
        }
    }
}
